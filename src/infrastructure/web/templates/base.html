<!doctype html>
<html lang="pt-br" class="h-full bg-slate-50">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAPPER - Utilitário de Gerenciamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='app_icon.png') }}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="h-full flex flex-col">
    <header class="sticky top-0 z-50 glass shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <img src="{{ url_for('static', filename='app_icon.png') }}" alt="Logo"
                        class="w-8 h-8 rounded-lg shadow-sm">
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">
                        MAPPER <span class="text-blue-600">OJC</span>
                    </h1>
                </div>
                {% if session.username %}
                <div class="flex items-center gap-3 sm:gap-4">
                    <div class="text-sm text-slate-600 flex items-center gap-2">
                        <span class="font-semibold text-slate-900">{{ session.username }}</span>
                        <span
                            class="bg-blue-50 text-blue-700 px-2.5 py-0.5 rounded-full text-[10px] font-bold border border-blue-100 uppercase tracking-wider">
                            {{ session.role }}
                        </span>
                    </div>
                    <div class="h-4 w-px bg-slate-200"></div>
                    <a href="{{ url_for('auth.logout') }}"
                        class="text-slate-400 hover:text-red-500 transition-colors flex items-center gap-1 group"
                        title="Sair">
                        <span class="text-xs font-medium group-hover:underline">Sair</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </a>
                </div>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="flex-grow">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-slate-500">
            <p>&copy; 2026 MAPPER - Projeto TADS UNITINS/Anhanguera</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Modal Usuário (Global) -->
    <div id="modal-usuario"
        class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div
            class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b border-slate-100">
                <h3 id="modal-title" class="text-lg font-bold text-slate-800">Novo Usuário</h3>
            </div>
            <div class="p-6 space-y-4 text-left">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Usuário</label>
                    <input type="text" id="input-username" oninput="validarFormUsuario()"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 transition-all font-sans"
                        placeholder="Nome de usuário">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Perfil</label>
                    <select id="select-role" onchange="validarFormUsuario()"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 transition-all font-sans">
                        <option value="">Selecione um perfil...</option>
                        <option value="Gerente">Gerente</option>
                        <option value="Editor">Editor</option>
                        <option value="Default">Default</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Senha Inicial</label>
                    <input type="password" id="input-password" oninput="validarFormUsuario()"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 transition-all font-sans"
                        placeholder="Senha">
                </div>
            </div>
            <div class="p-6 bg-slate-50 flex gap-3 justify-end text-sm">
                <button onclick="fecharModalUsuario()"
                    class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-200 transition-all">
                    Cancelar
                </button>
                <button id="btn-salvar-usuario" onclick="salvarUsuario()" disabled
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    Salvar
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentModeUsuario = 'create';

        function abrirModalUsuario(mode, user) {
            currentModeUsuario = mode;
            const title = document.getElementById('modal-title');
            const inputUser = document.getElementById('input-username');
            const selectRole = document.getElementById('select-role');
            const inputPass = document.getElementById('input-password');

            const isEditor = "{{ session.role }}" === "Editor";

            if (mode === 'create') {
                title.textContent = 'Novo Usuário';
                inputUser.value = '';
                inputUser.disabled = false;
                selectRole.value = '';
                inputPass.value = '';
            } else {
                title.textContent = 'Editar Usuário';
                inputUser.value = user.username;
                inputUser.disabled = true;
                selectRole.value = user.role;
                inputPass.value = '';

                if (isEditor) {
                    selectRole.disabled = true;
                    title.textContent = 'Alterar Minha Senha';
                } else {
                    selectRole.disabled = false;
                }
            }

            validarFormUsuario();
            document.getElementById('modal-usuario').classList.remove('hidden');
        }

        function fecharModalUsuario() {
            document.getElementById('modal-usuario').classList.add('hidden');
            // Remove o parâmetro da URL se houver redirecionamento
            const url = new URL(window.location);
            if (url.searchParams.has('change_password')) {
                url.searchParams.delete('change_password');
                window.history.replaceState({}, '', url);
            }
        }

        function validarFormUsuario() {
            const u = document.getElementById('input-username').value.trim();
            const r = document.getElementById('select-role').value;
            const p = document.getElementById('input-password').value.trim();
            const btn = document.getElementById('btn-salvar-usuario');
            btn.disabled = !(u && r && p);
        }

        async function salvarUsuario() {
            const username = document.getElementById('input-username').value.trim();
            const role = document.getElementById('select-role').value;
            const password = document.getElementById('input-password').value.trim();

            try {
                const resp = await fetch('/usuarios/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: currentModeUsuario, username, role, password })
                });
                const data = await resp.json();

                if (data.success) {
                    fecharModalUsuario();
                    if (window.showToast) window.showToast(data.message, 'success');
                    else alert(data.message);
                    setTimeout(() => window.location.reload(), 1000);
                } else {
                    if (window.showToast) window.showToast(data.message, 'error');
                    else alert(data.message);
                }
            } catch (e) {
                alert('Erro ao salvar usuário.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('change_password') === '1') {
                abrirModalUsuario('edit', {
                    username: "{{ session.username }}",
                    role: "{{ session.role }}"
                });
            }
        });
    </script>
</body>

</html>
